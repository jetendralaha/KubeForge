# KubeForge Development Services

services:
  ollama:
    image: ollama/ollama:latest
    container_name: kubeforge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: kubeforge-ollama-init
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
        until curl -sf http://ollama:11434/api/tags >/dev/null 2>&1; do sleep 2; done &&
        ollama pull mistral:7b &&
        ollama pull nomic-embed-text &&
        echo 'Models ready!'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kubeforge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  ollama-data:
  qdrant-data:
