# Insecure deployment — intentionally has many anti-patterns
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure
  template:
    metadata:
      labels:
        app: insecure
    spec:
      hostNetwork: true
      containers:
        - name: app
          image: myapp:latest
          securityContext:
            privileged: true
          ports:
            - containerPort: 8080
              hostPort: 8080
          env:
            - name: DB_PASSWORD
              value: "plaintext-secret-123"
            - name: API_KEY
              value: "sk-1234567890abcdef"
